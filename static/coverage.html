<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2d6a4f">
    <meta name="description" content="Audit recipe coverage gaps by cuisine, meal type, and difficulty to identify areas needing expansion.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>Coverage Audit - Recepti</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="/static/js/theme.js" defer></script>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <header>
        <h1><a href="/" aria-label="Recepti home" style="color: white; text-decoration: none;"><svg class="icon" aria-hidden="true" style="width:20px;height:20px;vertical-align:middle;margin-right:6px;"><use href="/static/svg/icons.svg#icon-chart-bar"/></svg>Coverage Audit</a></h1>
        <span id="theme-toggle-wrap"></span>
        <nav role="navigation" aria-label="Main navigation">
            <a href="/" aria-label="Home"><svg class="icon" aria-hidden="true"><use href="/static/svg/icons.svg#icon-home"/></svg> Home</a>
            <a href="/recipes" aria-label="Recipes"><svg class="icon" aria-hidden="true"><use href="/static/svg/icons.svg#icon-utensils"/></svg> Recipes</a>
            <a href="/api/recipes" aria-label="API"><svg class="icon" aria-hidden="true"><use href="/static/svg/icons.svg#icon-clipboard-list"/></svg> API</a>
        </nav>
    </header>

    <main id="main-content">
        <div class="container">
            <header class="page-header animate-on-scroll">
                <h2 class="page-title">Recipe Coverage Audit</h2>
                <p class="page-subtitle">Total recipes: <strong id="total-recipes">--</strong></p>
            </header>

            <div class="layout animate-on-scroll">
                <section class="content">
                    <div class="stats-bar" style="margin-bottom: 24px;">
                        <span><svg class="icon" aria-hidden="true" style="width:16px;height:16px;"><use href="/static/svg/icons.svg#icon-alert-triangle"/></svg> Coverage holes: <strong id="hole-count">--</strong></span>
                        <span>SPARSE: <strong id="sparse-count">--</strong></span>
                        <span>EMPTY: <strong id="empty-count">--</strong></span>
                    </div>

                    <div class="charts-grid" id="charts-grid">
                        <div class="card" style="padding: 20px;">
                            <h3 class="drawer-section-title">By Cuisine</h3>
                            <div class="chart-container" id="chart-cuisine">
                                <div class="skeleton skeleton-card"></div>
                            </div>
                        </div>
                        <div class="card" style="padding: 20px;">
                            <h3 class="drawer-section-title">By Meal Type</h3>
                            <div class="chart-container" id="chart-meal-type">
                                <div class="skeleton skeleton-card"></div>
                            </div>
                        </div>
                        <div class="card" style="padding: 20px;">
                            <h3 class="drawer-section-title">By Difficulty</h3>
                            <div class="chart-container" id="chart-difficulty">
                                <div class="skeleton skeleton-card"></div>
                            </div>
                        </div>
                    </div>
                </section>

                <aside class="holes-sidebar">
                    <div class="card" style="padding: 0; overflow: hidden;">
                        <header style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);">
                            <h3 style="font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;">
                                <svg class="icon" aria-hidden="true" style="width:16px;height:16px;"><use href="/static/svg/icons.svg#icon-alert-triangle"/></svg>
                                Coverage Holes
                            </h3>
                            <button class="btn btn-ghost" id="copy-all-btn" style="padding:6px 12px;font-size:12px;" disabled>
                                <svg class="icon" aria-hidden="true" style="width:14px;height:14px;"><use href="/static/svg/icons.svg#icon-clipboard-list"/></svg>
                                Copy All
                            </button>
                        </header>
                        <div id="holes-list">
                            <div class="loading">Loading coverage data...</div>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/coverage.js"></script>
    <script src="/static/js/animations.js" defer></script>
    <script>
        document.getElementById('theme-toggle-wrap').appendChild(window.ReceptiTheme.createToggle());
    </script>
</body>
</html>
