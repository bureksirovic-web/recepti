<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2d6a4f">
  <meta name="description" content="Nutrient tracking and family nutrition balance">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <title>Family Nutrition Dashboard — Recepti</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <script src="/static/js/theme.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <a href="index.html" aria-label="Recepti home">
      <svg class="icon" aria-hidden="true" width="20" height="20"><use href="/static/svg/icons.svg#heart-pulse"/></svg>
      Recepti
    </a>
    <div class="nav-links">
      <a href="recipes.html" aria-label="Recipes">
        <svg class="icon" aria-hidden="true"><use href="/static/svg/icons.svg#book-open"/></svg>
        Recipes
      </a>
      <a href="/" aria-label="Dashboard">
        <svg class="icon" aria-hidden="true"><use href="/static/svg/icons.svg#sliders"/></svg>
        Dashboard
      </a>
      <a href="nutrients.html" aria-current="page" aria-label="Nutrition">
        <svg class="icon" aria-hidden="true"><use href="/static/svg/icons.svg#heart-pulse"/></svg>
        Nutrition
      </a>
    </div>
    <span id="theme-toggle-wrap"></span>
  </nav>

  <div class="controls">
    <label>
      Period:
      <select id="periodSelect">
        <option value="7">Last 7 days</option>
        <option value="14">Last 14 days</option>
        <option value="30">Last 30 days</option>
      </select>
    </label>
    <button id="refreshBtn">Refresh</button>
    <span id="statusMsg" style="font-size:0.8rem;color:rgba(255,255,255,0.4);"></span>
  </div>

  <div id="main-content">
  <div id="notConfigured" class="error-msg" style="display:none">
    No family members configured yet. Run <code>/addmember</code> in the Telegram bot first.
  </div>

  <div id="dashboard" class="dashboard-grid" style="display:none">
    <div class="member-card animate-on-scroll" style="grid-column:1/-1">
      <h3>Suggested Groceries</h3>
      <div id="groceryTags" style="margin-top:8px"></div>
    </div>
  </div>

  <div id="loading" class="loading">Loading nutrition data…</div>
</div>

<script src="/static/js/nutrients.js"></script>
  <script>
    document.getElementById('theme-toggle-wrap').appendChild(window.ReceptiTheme.createToggle());
  </script>
</body>
</html>
